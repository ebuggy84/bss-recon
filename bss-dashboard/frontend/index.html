<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS Recon — Burgohy Security Solutions</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        navy: { 950:'#050C18', 900:'#0A1628', 800:'#0F1F3D', 700:'#162843', 600:'#1E3A5A', 500:'#2A4D73' },
        bss:  { blue:'#1E88E5', bright:'#42A5F5', dim:'#1565C0' },
      },
      fontFamily: { mono: ["'Courier New'", 'Courier', 'monospace'] },
    }
  }
}
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --bss-navy: #1A1A2E;
    --bss-navy-deep: #12121F;
    --bss-gold: #B8960C;
    --bss-gold-bright: #E4C04A;
    --glass-bg: rgba(19, 31, 58, 0.55);
    --glass-border: rgba(125, 165, 215, 0.14);
    --glass-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
  }

  * { box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  body { margin: 0;
         background: radial-gradient(1100px 620px at 18% -12%, #131d38 0%, rgba(5,12,24,0) 60%), #050C18;
         background-attachment: fixed;
         color: #C9D6E8;
         font-family: 'Inter', -apple-system, 'Segoe UI', system-ui, sans-serif;
         letter-spacing: 0.01em; }
  body.light { background: #F0F4F8; color: #1E293B; }

  h1, h2, h3 { letter-spacing: -0.015em; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2A4D73; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3B6B96; }

  /* Leaflet dark tile override */
  .leaflet-tile { filter: invert(1) hue-rotate(195deg) brightness(0.75) contrast(0.88) saturate(0.7); }
  .leaflet-container { background: #0A1628 !important; }
  .leaflet-control-attribution { display: none !important; }

  /* ── Glassmorphism card ──────────────────────────────────────── */
  .card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    box-shadow: var(--glass-shadow);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }
  .light .card {
    background: rgba(255, 255, 255, 0.85);
    border-color: #CBD5E1;
    box-shadow: 0 4px 20px rgba(30, 41, 59, 0.08);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  /* ── Module status cards: smooth state transitions ───────────── */
  .module-card {
    position: relative;
    overflow: hidden;
    transition: border-color .35s ease, box-shadow .45s ease, background .35s ease, transform .2s ease, opacity .35s ease;
  }
  .module-card:hover { transform: translateY(-2px); }
  .module-card[data-status="pending"] { opacity: 0.72; }
  .module-card[data-status="done"] {
    box-shadow: var(--glass-shadow), inset 0 0 0 1px rgba(34, 197, 94, 0.12);
  }
  .module-card[data-status="running"] {
    border-color: rgba(66, 165, 245, 0.55);
    animation: moduleGlow 1.8s ease-in-out infinite;
  }
  @keyframes moduleGlow {
    0%, 100% { box-shadow: var(--glass-shadow), 0 0 0 1px rgba(66,165,245,0.25), 0 0 18px rgba(66,165,245,0.10); }
    50%      { box-shadow: 0 8px 34px rgba(0,0,0,0.40), 0 0 0 1px rgba(66,165,245,0.55), 0 0 30px rgba(66,165,245,0.30); }
  }
  /* shimmer sweep across running cards */
  .module-card[data-status="running"]::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(105deg, transparent 32%, rgba(66,165,245,0.12) 50%, transparent 68%);
    background-size: 220% 100%;
    animation: shimmer 2.2s linear infinite;
  }
  @keyframes shimmer { 0% { background-position: 220% 0; } 100% { background-position: -120% 0; } }

  /* live pulsing status dot (replaces plain "running" text glyph) */
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: #42A5F5; margin-right: 6px; vertical-align: middle;
    animation: livePulse 1.4s ease-out infinite;
  }
  @keyframes livePulse {
    0%   { box-shadow: 0 0 0 0 rgba(66,165,245,0.55); }
    70%  { box-shadow: 0 0 0 7px rgba(66,165,245,0); }
    100% { box-shadow: 0 0 0 0 rgba(66,165,245,0); }
  }

  .module-pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* Indeterminate spinning sweep for the per-module scanning gauges */
  .gauge-spin { transform-box: fill-box; transform-origin: 50% 50%; animation: gaugeSpin 1.1s linear infinite; }
  @keyframes gaugeSpin { to { transform: rotate(360deg); } }

  /* ── Severity text/util colors (referenced by JS classNames) ──── */
  .sev-critical { color: #F87171; }
  .sev-high     { color: #FB923C; }
  .sev-medium   { color: #FACC15; }
  .sev-low      { color: #34D399; }
  .sev-info     { color: #94A3B8; }

  .bg-sev-critical { background: #EF4444; }
  .bg-sev-high     { background: #F97316; }
  .bg-sev-medium   { background: #EAB308; }
  .bg-sev-low      { background: #22C55E; }
  .bg-sev-info     { background: #64748B; }

  .border-sev-critical { border-color: #EF4444; }
  .border-sev-high     { border-color: #F97316; }
  .border-sev-medium   { border-color: #EAB308; }
  .border-sev-low      { border-color: #22C55E; }
  .border-sev-info     { border-color: #64748B; }

  /* ── Severity pills (gradient) ───────────────────────────────── */
  .sev-pill {
    display: inline-block; color: #fff; font-weight: 800;
    border-radius: 999px; letter-spacing: 0.06em;
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    font-family: 'Inter', system-ui, sans-serif;
  }
  .sev-pill-critical { background: linear-gradient(135deg,#EF4444,#B91C1C); }
  .sev-pill-high     { background: linear-gradient(135deg,#FB923C,#EA580C); }
  .sev-pill-medium   { background: linear-gradient(135deg,#FACC15,#CA8A04); color:#3B2F00; }
  .sev-pill-low      { background: linear-gradient(135deg,#34D399,#059669); }
  .sev-pill-info     { background: linear-gradient(135deg,#94A3B8,#475569); }

  /* ── Brand accents (navy #1A1A2E / gold #B8960C) ─────────────── */
  .app-header {
    background: linear-gradient(180deg, #1A1A2E 0%, #0A1424 100%) !important;
    border-bottom: 1px solid rgba(184,150,12,0.30) !important;
    box-shadow: 0 1px 0 rgba(184,150,12,0.16), 0 6px 24px rgba(0,0,0,0.35);
  }
  .nav-btn { position: relative; transition: color .18s ease; }
  .nav-btn::after {
    content: ''; position: absolute; left: 10px; right: 10px; bottom: -1px; height: 2px; border-radius: 2px;
    background: linear-gradient(90deg, var(--bss-gold), var(--bss-gold-bright));
    transform: scaleX(0); transform-origin: center; transition: transform .22s ease;
  }
  .nav-btn.active::after { transform: scaleX(1); }

  input, select { outline: none; }
  input:focus, select:focus { ring: 2px solid #1E88E5; }
  button:focus-visible { outline: 2px solid var(--bss-gold); outline-offset: 2px; }

  .tab-active { border-bottom: 2px solid #1E88E5; color: #42A5F5; }

  /* ═══════════════════════════════════════════════════════════════
     ENTERPRISE SHELL — sidebar nav, top bar, KPIs, data tables
     ═══════════════════════════════════════════════════════════════ */
  :root {
    --elev-1: 0 1px 2px rgba(0,0,0,0.30);
    --elev-2: 0 4px 14px rgba(0,0,0,0.35);
    --elev-3: 0 14px 40px rgba(2,8,20,0.55);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --sidebar-bg: linear-gradient(180deg, #14141F 0%, #0B1220 58%, #081020 100%);
  }

  /* Left navigation rail */
  .app-sidebar {
    width: 244px; flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid rgba(184,150,12,0.14);
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 6px 0 26px rgba(0,0,0,0.30);
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 11px;
    padding: 16px 16px 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .sidebar-nav {
    padding: 12px 10px; display: flex; flex-direction: column; gap: 3px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .nav-item {
    display: flex; align-items: center; gap: 11px; width: 100%;
    padding: 9px 12px; border-radius: 8px; border: none; cursor: pointer;
    background: transparent; color: #8FA6C4; font-size: 12.5px; font-weight: 600;
    font-family: inherit; letter-spacing: 0.01em; text-align: left;
    position: relative; transition: background .18s var(--ease), color .18s ease;
  }
  .nav-item:hover { background: rgba(255,255,255,0.045); color: #D6E2F2; }
  .nav-item.active { background: rgba(184,150,12,0.13); color: #F1D98A; }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px;
    border-radius: 0 3px 3px 0;
    background: linear-gradient(180deg, var(--bss-gold), var(--bss-gold-bright));
  }
  .nav-item .ico { width: 18px; text-align: center; flex-shrink: 0; opacity: 0.85; font-size: 13px; }
  .sidebar-section-label {
    font-size: 10px; font-weight: 700; color: #3B6B96; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 15px 16px 7px;
  }

  /* Top bar inside the content column */
  .topbar {
    height: 52px; flex-shrink: 0; display: flex; align-items: center; gap: 12px;
    padding: 0 20px; background: rgba(10,20,36,0.72);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #12233d;
  }

  /* KPI / metric cards */
  .stat-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 16px 18px 15px; box-shadow: var(--elev-2);
    position: relative; overflow: hidden;
    transition: transform .25s var(--ease), box-shadow .25s ease, border-color .25s ease;
  }
  .stat-card:hover { transform: translateY(-3px); box-shadow: var(--elev-3); border-color: rgba(184,150,12,0.32); }
  .stat-card .kpi { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat-card .kpi-label { font-size: 11px; color: #5B7FA6; margin-top: 7px; font-weight: 600; letter-spacing: 0.03em; }
  .stat-card .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }

  /* Data tables — sticky header, hover rows */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table thead th {
    position: sticky; top: 0; z-index: 1;
    background: #0B1A30 !important;
    border-bottom: 1px solid #1B3050 !important;
  }
  .data-table tbody tr { transition: background .12s ease; }
  .data-table tbody tr:hover { background: rgba(66,165,245,0.08) !important; }

  /* Skeleton loading shimmer */
  .skeleton { position: relative; overflow: hidden; background: #0E1E38; border-radius: 8px; }
  .skeleton::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    transform: translateX(-100%); animation: skel 1.3s infinite;
  }
  @keyframes skel { 100% { transform: translateX(100%); } }

  /* Generic card lift helper */
  .card.elevate { transition: transform .25s var(--ease), box-shadow .25s ease; }
  .card.elevate:hover { transform: translateY(-2px); box-shadow: var(--elev-3); }
</style>
</head>
<body>
<div id="root"></div>

<script>
// Force classic JSX runtime and manually trigger Babel processing
;(function() {
  var orig = Babel.availablePresets['react'];
  Babel.availablePresets['react'] = function(ctx, opts) {
    return orig(ctx, Object.assign({}, opts || {}, { runtime: 'classic' }));
  };
  // Babel may have already registered its DOMContentLoaded — override by running after load
  Babel.disableScriptTags();
  window.addEventListener('load', function() { Babel.transformScriptTags(); });
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ─── Config ───────────────────────────────────────────────────────────────────
const API = `http://${window.location.hostname}:8000`;
const WS_BASE = `ws://${window.location.hostname}:8000`;

// ─── Theme context ─────────────────────────────────────────────────────────────
const ThemeCtx = createContext({ theme: 'dark', toggle: () => {} });

// ─── API helpers ───────────────────────────────────────────────────────────────
const api = {
  startScan: (target, active, modules, profile) =>
    fetch(`${API}/api/scan`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ target, active, modules: modules.length ? modules : null, profile: profile || 'balanced' }),
    }).then(r => r.json()),

  getStatus: (id) => fetch(`${API}/api/scan/${id}/status`).then(r => r.json()),
  getResults: (id) => fetch(`${API}/api/scan/${id}/results`).then(r => r.json()),
  getHistory: () => fetch(`${API}/api/scans`).then(r => r.json()),
  compare: (a, b) => fetch(`${API}/api/compare/${a}/${b}`).then(r => r.json()),
};

// ─── Severity helpers ──────────────────────────────────────────────────────────
const SEV_ORDER = ['critical','high','medium','low','info'];
const sevRank = s => SEV_ORDER.indexOf((s||'info').toLowerCase());
const sevLabel = s => (s||'info').toUpperCase();
const sevClass = s => `sev-${(s||'info').toLowerCase()}`;
const sevBgClass = s => `bg-sev-${(s||'info').toLowerCase()}`;
const sevBorderClass = s => `border-sev-${(s||'info').toLowerCase()}`;
const sevColors = {
  critical: '#EF4444', high: '#F97316', medium: '#EAB308', low: '#22C55E', info: '#64748B'
};

function SevBadge({ sev, small }) {
  const s = (sev||'info').toLowerCase();
  return (
    <span className={`sev-pill sev-pill-${s}`} style={{
      fontSize: small ? '9.5px' : '10.5px',
      padding: small ? '2px 8px' : '3px 11px',
    }}>
      {s.toUpperCase()}
    </span>
  );
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) +
    ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}

function fmtDuration(a, b) {
  if (!a || !b) return null;
  const ms = new Date(b) - new Date(a);
  if (ms < 60000) return `${Math.round(ms/1000)}s`;
  return `${Math.round(ms/60000)}m ${Math.round((ms%60000)/1000)}s`;
}

// ─── Header ────────────────────────────────────────────────────────────────────
function Header({ view, onBack, onNav, scanTarget }) {
  const { theme, toggle } = useContext(ThemeCtx);
  const dark = theme === 'dark';
  const TITLES = {
    home: 'Security Dashboard', traffic: 'Traffic Analyzer', phishing: 'Phishing Analyzer',
    scanning: 'Active Scan', results: 'Scan Results', compare: 'Scan Comparison',
  };
  const showBack = !['home', 'traffic', 'phishing'].includes(view);
  return (
    <header className="topbar">
      {showBack && (
        <button onClick={onBack} style={{
          background: 'none', border: '1px solid #1B3050', borderRadius: 6, cursor: 'pointer',
          color: '#8FA6C4', fontSize: 11, padding: '5px 11px',
          display:'flex', alignItems:'center', gap:5,
        }}>← Back</button>
      )}
      <div style={{ fontSize: 14, fontWeight: 700, color: '#E2E8F0', letterSpacing: '-0.01em' }}>
        {TITLES[view] || 'Dashboard'}
      </div>
      {showBack && scanTarget && (
        <>
          <span style={{ color:'#1B3050' }}>/</span>
          <span style={{ fontSize: 12, color:'#42A5F5', fontFamily:'monospace' }}>{scanTarget}</span>
        </>
      )}
      {view === 'compare' && (
        <>
          <span style={{ color:'#1B3050' }}>/</span>
          <span style={{ fontSize: 12, color:'#A78BFA' }}>Comparison</span>
        </>
      )}
      <div style={{ flex: 1 }} />

      <span style={{ fontSize: 10, color: '#3B6B96', fontWeight: 600, letterSpacing: '0.05em',
        display:'flex', alignItems:'center', gap: 7, marginRight: 4 }}>
        <span className="live-dot" style={{ background:'#22C55E' }}></span> READ-ONLY RECON
      </span>

      {/* Theme toggle */}
      <button onClick={toggle} style={{
        background: dark ? '#0F1F3D' : '#FFFFFF22',
        border: `1px solid ${dark ? '#162843' : '#3B5A8A'}`,
        borderRadius: 6, cursor: 'pointer',
        color: '#C9D6E8', fontSize: 11, padding: '5px 10px',
        display:'flex', alignItems:'center', gap: 5,
      }}>
        {dark ? '☀ Light' : '☾ Dark'}
      </button>
    </header>
  );
}

// ─── Sidebar ────────────────────────────────────────────────────────────────────
function Sidebar({ view, onNav, history, onSelect, activeScanId, compareMode, selectedForCompare, onToggleCompare }) {
  const { theme } = useContext(ThemeCtx);
  const dark = theme === 'dark';

  const NAV = [
    ['home', 'Dashboard', '▤'],
    ['traffic', 'Traffic Analyzer', '⇄'],
    ['phishing', 'Phishing Analyzer', '✉'],
  ];

  return (
    <aside className="app-sidebar">
      {/* Brand */}
      <div className="sidebar-brand">
        <div style={{
          width: 34, height: 34, borderRadius: 8,
          background: 'linear-gradient(135deg, #1E88E5, #0D47A1)',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize: 14, fontWeight: 900, color: '#fff', fontFamily: 'monospace', letterSpacing: '-1px',
          boxShadow: '0 0 0 1px rgba(184,150,12,0.55), 0 2px 10px rgba(0,0,0,0.4)',
        }}>BSS</div>
        <div>
          <div style={{ fontSize: 13.5, fontWeight: 800, color: '#F1F5FB', lineHeight: 1.15 }}>BSS Recon</div>
          <div style={{ fontSize: 9.5, color: '#B8960C', lineHeight: 1.15, fontWeight: 600, letterSpacing: '0.04em' }}>Security Platform</div>
        </div>
      </div>

      {/* Primary navigation */}
      <nav className="sidebar-nav">
        {NAV.map(([k, l, ico]) => (
          <button key={k} className={`nav-item ${view === k ? 'active' : ''}`} onClick={() => onNav(k)}>
            <span className="ico" aria-hidden="true">{ico}</span>{l}
          </button>
        ))}
      </nav>

      {/* Scan history */}
      <div className="sidebar-section-label" style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span>Scan History</span>
        {history.length >= 2 && (
          <button onClick={onToggleCompare} style={{
            fontSize: 9, padding: '2px 6px', borderRadius: 4,
            background: compareMode ? '#1E88E5' : 'transparent',
            border: `1px solid ${compareMode ? '#1E88E5' : '#2A4D73'}`,
            color: compareMode ? '#fff' : '#5B7FA6',
            cursor: 'pointer', letterSpacing:'0.04em',
          }}>
            COMPARE
          </button>
        )}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'2px 0 10px' }}>
        {history.length === 0 && (
          <div style={{ padding:'20px 14px', fontSize:11, color:'#2A4D73', textAlign:'center' }}>
            No scans yet
          </div>
        )}
        {history.map(h => {
          const isActive = h.scan_id === activeScanId;
          const isSelected = selectedForCompare.includes(h.scan_id);
          const sc = h.severity_counts || {};
          return (
            <div key={h.scan_id} onClick={() => onSelect(h.scan_id)} style={{
              padding: '9px 14px',
              cursor: 'pointer',
              background: isActive ? '#0F1F3D' : isSelected ? '#0A1E38' : 'transparent',
              borderLeft: `3px solid ${isActive ? '#1E88E5' : isSelected ? '#A78BFA' : 'transparent'}`,
              transition: 'background 0.15s',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap: 5, marginBottom: 3 }}>
                {compareMode && (
                  <span style={{
                    width:14, height:14, borderRadius:3, border:`1.5px solid ${isSelected ? '#A78BFA':'#2A4D73'}`,
                    background: isSelected ? '#A78BFA22' : 'transparent',
                    display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:9,
                    color: '#A78BFA', flexShrink:0,
                  }}>{isSelected ? '✓' : ''}</span>
                )}
                <span style={{ fontSize:11, fontWeight:600, color:'#C9D6E8', fontFamily:'monospace',
                  overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1 }}>
                  {h.target}
                </span>
              </div>
              <div style={{ fontSize:10, color:'#3B6B96', marginBottom: 4 }}>{fmtDate(h.started_at)}</div>
              <div style={{ display:'flex', alignItems:'center', gap: 4, flexWrap:'wrap' }}>
                {h.status === 'running' && (
                  <span style={{ fontSize:10, color:'#42A5F5' }} className="module-pulse">● scanning</span>
                )}
                {h.status === 'complete' && SEV_ORDER.filter(s => sc[s]).map(s => (
                  <span key={s} style={{
                    fontSize:9, fontWeight:700, color: sevColors[s], fontFamily:'monospace'
                  }}>{sc[s]}{s[0].toUpperCase()}</span>
                ))}
                {h.status === 'complete' && !SEV_ORDER.some(s => sc[s]) && (
                  <span style={{ fontSize:10, color:'#22C55E' }}>✓ clean</span>
                )}
                {h.status === 'queued' && (
                  <span style={{ fontSize:10, color:'#5B7FA6' }}>queued</span>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </aside>
  );
}

    complete.forEach(h => {

// ─── Per-module circular scanning gauge ─────────────────────────────────────────
function ModuleGauge({ status, count }) {
  const R = 18, C = 2 * Math.PI * R;
  const centerColor = { done:'#22C55E', error:'#EF4444', running:'#E4C04A', pending:'#2A4D73' }[status] || '#2A4D73';
  return (
    <div style={{ position:'relative', width:52, height:52, flexShrink:0 }}>
      <svg viewBox="0 0 44 44" width="52" height="52">
        {/* track */}
        <circle cx="22" cy="22" r={R} fill="none" stroke="#12233d" strokeWidth="4"/>
        {/* done: full green ring */}
        {status === 'done' && (
          <circle cx="22" cy="22" r={R} fill="none" stroke="#22C55E" strokeWidth="4" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset="0" transform="rotate(-90 22 22)"
            style={{ transition:'stroke-dashoffset .6s ease' }}/>
        )}
        {/* error: full red ring */}
        {status === 'error' && (
          <circle cx="22" cy="22" r={R} fill="none" stroke="#EF4444" strokeWidth="4"
            strokeDasharray={C} strokeDashoffset="0"/>
        )}
        {/* running: indeterminate gold→blue sweep */}
        {status === 'running' && (
          <g className="gauge-spin">
            <circle cx="22" cy="22" r={R} fill="none" stroke="url(#gaugeSweep)" strokeWidth="4"
              strokeLinecap="round" strokeDasharray={`${C * 0.28} ${C}`} transform="rotate(-90 22 22)"/>
          </g>
        )}
      </svg>
      <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
        fontSize: status === 'done' ? 14 : 12, fontWeight:800, color:centerColor, fontVariantNumeric:'tabular-nums' }}>
        {status === 'done' ? (count || 0) : status === 'error' ? '✕' : status === 'pending' ? '○' : ''}
      </div>
    </div>
  );
}

// ─── Attack surface score gauge (0–100, colour-zoned) ────────────────────────────

  const v = Math.max(0, Math.min(100, Math.round(score || 0)));
  const R = 74, C = 2 * Math.PI * R;

  const zone = v <= 30 ? '#22C55E' : v <= 60 ? '#EAB308' : v <= 80 ? '#F97316' : '#EF4444';
  const label = v <= 30 ? 'Low' : v <= 60 ? 'Moderate' : v <= 80 ? 'High' : 'Critical';

}

function ScanningView({ scanId, target, active, onComplete }) {
  const [modules, setModules] = useState({});
  const [progress, setProgress] = useState({ completed:0, total:0 });
  const [status, setStatus] = useState('connecting');
  const wsRef = useRef(null);

  useEffect(() => {
    const ws = new WebSocket(`${WS_BASE}/ws/scan/${scanId}`);
    wsRef.current = ws;

    ws.onopen = () => setStatus('connected');
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'ping') return;

      if (msg.type === 'started') {
        const init = {};
        msg.modules.forEach(m => { init[m.name] = { status:'pending', description:m.description, mode:m.mode, finding_count:0 }; });
        setModules(init);
        setProgress({ completed:0, total:msg.modules.length });
      }
      if (msg.type === 'module_start') {
        setModules(p => ({ ...p, [msg.module]: { ...p[msg.module], status:'running' } }));
      }
      if (msg.type === 'module_done') {
        setModules(p => ({ ...p, [msg.module]: { ...p[msg.module], status:'done', finding_count:msg.finding_count } }));
        setProgress({ completed:msg.completed, total:msg.total });
      }
      if (msg.type === 'module_error') {
        setModules(p => ({ ...p, [msg.module]: { ...p[msg.module], status:'error', error:msg.error } }));
        setProgress({ completed:msg.completed, total:msg.total });
      }
      if (msg.type === 'complete') {
        setStatus('complete');
        setTimeout(() => onComplete(scanId), 800);
      }
    };
    ws.onerror = () => {
      setStatus('error');
      // Fall back to polling
      const poll = setInterval(async () => {
        try {
          const s = await api.getStatus(scanId);
          setModules(s.modules || {});
          setProgress({ completed: s.completed_modules, total: s.total_modules });
          if (s.status === 'complete') { clearInterval(poll); setStatus('complete'); setTimeout(() => onComplete(scanId), 800); }
        } catch {}
      }, 1500);
      return () => clearInterval(poll);
    };
    return () => ws.close();
  }, [scanId]);

  const pct = progress.total > 0 ? Math.round((progress.completed / progress.total) * 100) : 0;
  const moduleList = Object.entries(modules);

  const statusColor = { running:'#1E88E5', done:'#22C55E', error:'#EF4444', pending:'#2A4D73' };

  return (
    <div className="fade-in" style={{ maxWidth:820, margin:'32px auto', padding:'0 20px' }}>
      {/* Header */}
      <div className="card" style={{ padding:'18px 22px', marginBottom:16 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <div>
            <div style={{ fontSize:11, color:'#3B6B96', marginBottom:3, fontWeight:700, letterSpacing:'0.08em', textTransform:'uppercase' }}>
              {status === 'complete' ? 'Scan Complete' : 'Scanning'}
            </div>
            <div style={{ fontSize:16, fontWeight:700, fontFamily:'monospace', color:'#E2E8F0' }}>{target}</div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:24, fontWeight:700, color:'#1E88E5', fontVariantNumeric:'tabular-nums' }}>{pct}%</div>
            <div style={{ fontSize:11, color:'#3B6B96' }}>{progress.completed}/{progress.total} modules</div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{ height:4, background:'#0A1628', borderRadius:2, overflow:'hidden' }}>
          <div style={{
            height:'100%', borderRadius:2, transition:'width 0.4s ease',
            width:`${pct}%`,
            background: status === 'complete' ? '#22C55E' : 'linear-gradient(90deg, #1E88E5, #42A5F5)',
          }}/>
        </div>
        {active && (
          <div style={{ marginTop:8, fontSize:11, color:'#F97316', display:'flex', alignItems:'center', gap:5 }}>
            <span>⚡</span> Active mode — ensure you have written authorization
          </div>
        )}
      </div>

      {/* Shared gradient for the running gauge sweep (gold → blue) */}
      <svg width="0" height="0" style={{ position:'absolute' }} aria-hidden="true">
        <defs>
          <linearGradient id="gaugeSweep" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor="#B8960C"/>
            <stop offset="1" stopColor="#42A5F5"/>
          </linearGradient>
        </defs>
      </svg>

      {/* Module grid */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(250px, 1fr))', gap:10 }}>
        {moduleList.map(([name, m]) => (
          <div key={name} className="card module-card" data-status={m.status} style={{
            padding:'13px 15px',
            borderLeft:`3px solid ${statusColor[m.status] || '#2A4D73'}`,
            display:'flex', alignItems:'center', gap:13,
          }}>
            <ModuleGauge status={m.status} count={m.finding_count}/>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:6, marginBottom:2 }}>
                <span style={{ fontFamily:'monospace', fontSize:12, fontWeight:700, color:'#C9D6E8' }}>{name}</span>
                <span style={{ fontSize:10 }}>
                  {m.status === 'running' && <span style={{ color:'#E4C04A', fontWeight:700 }}><span className="live-dot" style={{ background:'#E4C04A' }}></span>running</span>}
                  {m.status === 'done'    && <span style={{ color:'#22C55E' }}>✓ done</span>}
                  {m.status === 'error'   && <span style={{ color:'#EF4444' }}>✗ error</span>}
                  {m.status === 'pending' && <span style={{ color:'#2A4D73' }}>○ pending</span>}
                </span>
              </div>
              <div style={{ fontSize:10, color:'#3B6B96', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{m.description}</div>
              {m.status === 'done' && m.finding_count > 0 && (
                <div style={{ fontSize:10, color:'#F97316', fontWeight:700, marginTop:2 }}>
                  {m.finding_count} finding{m.finding_count !== 1 ? 's' : ''}
                </div>
              )}
              {m.status === 'error' && (
                <div style={{ fontSize:10, color:'#EF4444', marginTop:2 }} title={m.error}>error — {m.error?.slice(0,40)}</div>
              )}
              {m.mode === 'active' && (
                <div style={{ fontSize:9, color:'#F9731660', marginTop:2, fontWeight:700, letterSpacing:'0.05em' }}>ACTIVE</div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Charts ────────────────────────────────────────────────────────────────────
function OWASPChart({ findings }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const counts = {};
    findings.forEach(f => {
      const cat = (f.owasp || 'Unknown').split(' ').slice(0,2).join(' ');
      counts[cat] = (counts[cat] || 0) + 1;
    });
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,8);
    const labels = sorted.map(([k]) => k);
    const data = sorted.map(([,v]) => v);
    const colors = sorted.map(([,v], i) => `hsl(${210 + i*12}, 70%, ${50 - i*3}%)`);

    if (chartRef.current) { chartRef.current.destroy(); }
    if (!canvasRef.current || sorted.length === 0) return;

    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{ data, backgroundColor: colors, borderRadius: 4, borderSkipped: false }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend:{ display:false }, tooltip: {
          callbacks: { label: ctx => ` ${ctx.raw} finding${ctx.raw !== 1 ? 's':''}`}
        }},
        scales: {
          x: { grid:{ color:'#162843' }, ticks:{ color:'#5B7FA6', font:{size:10} } },
          y: { grid:{ display:false }, ticks:{ color:'#C9D6E8', font:{size:10} } },
        },
      },
    });
    return () => { chartRef.current?.destroy(); chartRef.current = null; };
  }, [findings]);

  if (!findings.length) return null;
  return (
    <div className="card" style={{ padding:'16px 18px' }}>
      <div style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
        textTransform:'uppercase', marginBottom:12 }}>OWASP Top 10 Coverage</div>
      <div style={{ height: 200 }}><canvas ref={canvasRef}/></div>
    </div>
  );
}

function SeverityDonut({ counts }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    const sevsWithData = SEV_ORDER.filter(s => counts[s]);
    if (!sevsWithData.length || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: sevsWithData.map(s => s.charAt(0).toUpperCase() + s.slice(1)),
        datasets: [{
          data: sevsWithData.map(s => counts[s]),
          backgroundColor: sevsWithData.map(s => sevColors[s]),
          borderColor: '#0F1F3D',
          borderWidth: 2,
          hoverOffset: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: {
          legend: { position:'right', labels:{ color:'#C9D6E8', font:{size:11}, boxWidth:12, padding:10 }},
          tooltip: { callbacks: { label: ctx => ` ${ctx.raw} finding${ctx.raw !== 1 ? 's':''}` }},
        },
      },
    });
    return () => { chartRef.current?.destroy(); chartRef.current = null; };
  }, [counts]);

  const total = SEV_ORDER.reduce((a,s) => a + (counts[s]||0), 0);
  if (!total) return null;

  return (
    <div className="card" style={{ padding:'16px 18px' }}>
      <div style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
        textTransform:'uppercase', marginBottom:12 }}>Severity Distribution</div>
      <div style={{ height: 160, position:'relative' }}>
        <canvas ref={canvasRef}/>
        <div style={{
          position:'absolute', top:'50%', left:'34%', transform:'translate(-50%,-50%)',
          textAlign:'center', pointerEvents:'none',
        }}>
          <div style={{ fontSize:22, fontWeight:700, color:'#E2E8F0', fontVariantNumeric:'tabular-nums' }}>{total}</div>
          <div style={{ fontSize:10, color:'#3B6B96' }}>findings</div>
        </div>
      </div>
    </div>
  );
}

function TrendChart({ history, target }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const scans = useMemo(() =>
    history
      .filter(h => h.target === target && h.status === 'complete' && h.started_at)
      .sort((a,b) => new Date(a.started_at) - new Date(b.started_at))
      .slice(-10),
    [history, target]
  );

  useEffect(() => {
    if (scans.length < 2 || !canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();

    const labels = scans.map(s => fmtDate(s.started_at));
    const datasets = ['critical','high','medium'].map(sev => ({
      label: sev.charAt(0).toUpperCase() + sev.slice(1),
      data: scans.map(s => (s.severity_counts||{})[sev] || 0),
      borderColor: sevColors[sev],
      backgroundColor: sevColors[sev] + '20',
      tension: 0.35,
      fill: true,
      pointRadius: 4,
    }));

    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{ labels:{ color:'#C9D6E8', font:{size:10}, boxWidth:10 }}},
        scales: {
          x: { grid:{ color:'#162843' }, ticks:{ color:'#5B7FA6', font:{size:9} }},
          y: { grid:{ color:'#162843' }, ticks:{ color:'#5B7FA6', font:{size:10} }, min:0, precision:0 },
        },
      },
    });
    return () => { chartRef.current?.destroy(); chartRef.current = null; };
  }, [scans]);

  if (scans.length < 2) return null;
  return (
    <div className="card" style={{ padding:'16px 18px' }}>
      <div style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
        textTransform:'uppercase', marginBottom:12 }}>Severity Trend — {target}</div>
      <div style={{ height:180 }}><canvas ref={canvasRef}/></div>
    </div>
  );
}

// ─── Threat map ────────────────────────────────────────────────────────────────
function ThreatMap({ findings }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);

  useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const map = L.map(mapRef.current, { zoomControl:true, scrollWheelZoom:false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'OSM', maxZoom:18
    }).addTo(map);
    map.setView([20, 0], 2);
    mapInstanceRef.current = map;
  }, []);

  useEffect(() => {
    const map = mapInstanceRef.current;
    if (!map) return;

    // Extract IPs from _nmap findings
    const ips = [];
    findings.forEach(f => {
      if (f._nmap?.host) ips.push(f._nmap.host);
    });
    const uniqueIps = [...new Set(ips)].filter(ip => /^\d+\.\d+\.\d+\.\d+$/.test(ip));

    if (!uniqueIps.length) return;

    // Batch geolocate via ip-api.com (free, 100/min limit)
    const batch = uniqueIps.slice(0, 20).map(ip => ({ query: ip }));
    fetch('http://ip-api.com/batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(batch),
    })
    .then(r => r.json())
    .then(results => {
      results.filter(r => r.status === 'success').forEach(r => {
        const marker = L.circleMarker([r.lat, r.lon], {
          radius: 7, color: '#1E88E5', fillColor: '#42A5F5', fillOpacity: 0.8, weight: 2
        });
        marker.bindPopup(
          `<div style="font-family:monospace;font-size:12px;line-height:1.6">
            <b>${r.query}</b><br/>
            ${r.city}, ${r.country}<br/>
            ISP: ${r.isp || '—'}
          </div>`
        );
        marker.addTo(map);
      });
    })
    .catch(() => {}); // Silent fail if ip-api is unreachable
  }, [findings]);

  return (
    <div className="card" style={{ padding:'16px 18px' }}>
      <div style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
        textTransform:'uppercase', marginBottom:12 }}>Threat Map — Infrastructure Geolocation</div>
      <div ref={mapRef} style={{ height:250, borderRadius:6, overflow:'hidden' }}/>
      <div style={{ fontSize:10, color:'#2A4D73', marginTop:6 }}>
        IPs extracted from Nmap findings — geolocated via ip-api.com
      </div>
    </div>
  );
}

// ─── Findings table ────────────────────────────────────────────────────────────
function FindingsTable({ findings }) {
  const [sortKey, setSortKey] = useState('severity');
  const [sortDir, setSortDir] = useState(1);
  const [expandedId, setExpandedId] = useState(null);
  const [filterSev, setFilterSev] = useState([]);
  const [filterMod, setFilterMod] = useState('');
  const [filterText, setFilterText] = useState('');

  const modules = useMemo(() => [...new Set(findings.map(f => f.module).filter(Boolean))], [findings]);

  const sorted = useMemo(() => {
    let f = findings.filter(x => {
      if (filterSev.length && !filterSev.includes(x.severity?.toLowerCase())) return false;
      if (filterMod && x.module !== filterMod) return false;
      if (filterText) {
        const t = filterText.toLowerCase();
        return (x.title||'').toLowerCase().includes(t) ||
               (x.detail||'').toLowerCase().includes(t) ||
               (x.owasp||'').toLowerCase().includes(t);
      }
      return true;
    });
    return f.sort((a,b) => {
      let va, vb;
      if (sortKey === 'severity') { va = sevRank(a.severity); vb = sevRank(b.severity); }
      else { va = (a[sortKey]||'').toLowerCase(); vb = (b[sortKey]||'').toLowerCase(); }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
  }, [findings, sortKey, sortDir, filterSev, filterMod, filterText]);

  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(d => -d);
    else { setSortKey(k); setSortDir(1); }
  };

  const thStyle = (k) => ({
    textAlign:'left', fontSize:10, fontWeight:700, color:'#3B6B96',
    letterSpacing:'0.08em', textTransform:'uppercase', padding:'8px 10px',
    cursor:'pointer', userSelect:'none', whiteSpace:'nowrap',
    borderBottom:'1px solid #162843',
  });

  return (
    <div className="card" style={{ overflow:'hidden' }}>
      {/* Filters */}
      <div style={{ padding:'12px 14px', borderBottom:'1px solid #162843',
        display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <input
          value={filterText}
          onChange={e => setFilterText(e.target.value)}
          placeholder="Search findings…"
          style={{
            background:'#050C18', border:'1px solid #162843', borderRadius:5,
            color:'#C9D6E8', fontSize:11, padding:'5px 9px', flex:1, minWidth:140,
          }}
        />
        <select
          value={filterMod}
          onChange={e => setFilterMod(e.target.value)}
          style={{
            background:'#050C18', border:'1px solid #162843', borderRadius:5,
            color: filterMod ? '#C9D6E8' : '#3B6B96', fontSize:11, padding:'5px 8px',
          }}
        >
          <option value="">All modules</option>
          {modules.map(m => <option key={m} value={m}>{m}</option>)}
        </select>
        <div style={{ display:'flex', gap:4 }}>
          {SEV_ORDER.map(s => (
            <button key={s} onClick={() => setFilterSev(p => p.includes(s) ? p.filter(x => x!==s) : [...p,s])}
              style={{
                fontSize:9, padding:'3px 7px', borderRadius:4, fontWeight:700,
                background: filterSev.includes(s) ? sevColors[s]+'33' : 'transparent',
                border: `1px solid ${filterSev.includes(s) ? sevColors[s] : '#162843'}`,
                color: filterSev.includes(s) ? sevColors[s] : '#2A4D73',
                cursor:'pointer', fontFamily:'monospace', letterSpacing:'0.04em',
              }}
            >{s[0].toUpperCase()}</button>
          ))}
        </div>
        <span style={{ fontSize:10, color:'#2A4D73', marginLeft:'auto', fontVariantNumeric:'tabular-nums' }}>
          {sorted.length}/{findings.length}
        </span>
      </div>

      {/* Table */}
      <div style={{ overflowX:'auto' }}>
        <table className="data-table" style={{ width:'100%', borderCollapse:'collapse' }}>
          <thead>
            <tr>
              {[['severity','Severity'],['title','Finding'],['module','Module'],['owasp','OWASP']].map(([k,l]) => (
                <th key={k} style={thStyle(k)} onClick={() => toggleSort(k)}>
                  {l}{sortKey===k ? (sortDir===1?' ↑':' ↓') : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sorted.length === 0 && (
              <tr><td colSpan={4} style={{ padding:'30px', textAlign:'center', color:'#2A4D73', fontSize:12 }}>
                No findings match the current filter
              </td></tr>
            )}
            {sorted.map((f, i) => {
              const id = `${f.severity}|${f.title}|${i}`;
              const expanded = expandedId === id;
              return (
                <React.Fragment key={id}>
                  <tr
                    onClick={() => setExpandedId(expanded ? null : id)}
                    style={{
                      cursor:'pointer',
                      background: expanded ? '#0F1F3D' : i%2===0 ? 'transparent' : '#08111F',
                      borderLeft:`3px solid ${expanded ? sevColors[f.severity?.toLowerCase()]||'#2A4D73' : 'transparent'}`,
                    }}
                  >
                    <td style={{ padding:'8px 10px' }}><SevBadge sev={f.severity} small/></td>
                    <td style={{ padding:'8px 10px', fontSize:12, color:'#C9D6E8', maxWidth:360 }}>
                      <div style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {f.title}
                      </div>
                    </td>
                    <td style={{ padding:'8px 10px', fontSize:11, color:'#5B7FA6', fontFamily:'monospace', whiteSpace:'nowrap' }}>{f.module||'—'}</td>
                    <td style={{ padding:'8px 10px', fontSize:10, color:'#3B6B96', maxWidth:220 }}>
                      <div style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{f.owasp||'—'}</div>
                    </td>
                  </tr>
                  {expanded && (
                    <tr style={{ background:'#0A1628' }}>
                      <td colSpan={4} style={{ padding:'0 14px 14px' }}>
                        <div className="fade-in" style={{
                          background:'#050C18', borderRadius:6, padding:'14px',
                          borderLeft:`3px solid ${sevColors[f.severity?.toLowerCase()]||'#2A4D73'}`,
                        }}>
                          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
                            <div>
                              <div style={{ fontSize:10, color:'#3B6B96', fontWeight:700, marginBottom:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>Detail</div>
                              <div style={{ fontSize:12, color:'#C9D6E8', lineHeight:1.6 }}>{f.detail||'—'}</div>
                            </div>
                            <div>
                              <div style={{ fontSize:10, color:'#3B6B96', fontWeight:700, marginBottom:4, letterSpacing:'0.06em', textTransform:'uppercase' }}>Remediation</div>
                              <div style={{ fontSize:12, color:'#22C55E', lineHeight:1.6 }}>{f.remediation||'—'}</div>
                            </div>
                          </div>
                          {f.mitre && (
                            <div style={{ marginTop:10, fontSize:10, color:'#5B7FA6' }}>
                              <span style={{ color:'#2A4D73', marginRight:6, fontWeight:700 }}>MITRE:</span>
                              <span style={{ fontFamily:'monospace' }}>{f.mitre}</span>
                            </div>
                          )}
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── Results view ───────────────────────────────────────────────────────────────
function ResultsView({ scanId, history }) {
  const [data, setData] = useState(null);
  const [tab, setTab] = useState('findings');

  useEffect(() => {
    setData(null);
    api.getResults(scanId).then(setData).catch(() => {});
  }, [scanId]);

  if (!data) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:200, color:'#3B6B96' }}>
      Loading results…
    </div>
  );

  const sc = data.severity_counts || {};
  const total = SEV_ORDER.reduce((a,s) => a+(sc[s]||0), 0);
  const duration = fmtDuration(data.started_at, data.finished_at);

  // Attack surface score: use the backend score if present, else derive a
  // weighted 0–100 risk score from the severity breakdown (presentational).
  const score = (typeof data.score === 'number')
    ? data.score
    : Math.min(100, Math.round(
        (sc.critical||0)*25 + (sc.high||0)*12 + (sc.medium||0)*5 + (sc.low||0)*2 + (sc.info||0)*0.5
      ));

  return (
    <div className="fade-in" style={{ padding:'20px', maxWidth:1100, margin:'0 auto' }}>
      {/* Summary row */}
      <div style={{ display:'flex', gap:10, marginBottom:16, flexWrap:'wrap' }}>
        {[
          { label:'Total', value:total, color:'#1E88E5' },
          ...SEV_ORDER.filter(s => sc[s]).map(s => ({ label:s.charAt(0).toUpperCase()+s.slice(1), value:sc[s], color:sevColors[s] })),
        ].map(c => (
          <div key={c.label} className="card" style={{
            padding:'12px 18px', flex:'1 1 100px', minWidth:90,
            borderTop:`3px solid ${c.color}`,
          }}>
            <div style={{ fontSize:24, fontWeight:700, color:c.color, fontVariantNumeric:'tabular-nums' }}>{c.value}</div>
            <div style={{ fontSize:11, color:'#3B6B96', marginTop:2 }}>{c.label}</div>

        ))}

          <div style={{ fontSize:12, fontWeight:700, color:'#C9D6E8', fontFamily:'monospace',
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{data.target}</div>
          <div style={{ fontSize:10, color:'#3B6B96', marginTop:2 }}>
            {duration && `${duration} • `}{fmtDate(data.started_at)}
            {data.active && <span style={{ color:'#F97316', marginLeft:6 }}>⚡ active</span>}
          </div>
        </div>
      </div>

      {/* Export bar */}
      <div style={{ display:'flex', gap:8, marginBottom:16, justifyContent:'flex-end' }}>
        <a href={`${API}/api/export/${scanId}/json`} target="_blank" rel="noreferrer">
          <button style={{
            background:'transparent', border:'1px solid #1E3A5A', borderRadius:6,
            color:'#5B7FA6', fontSize:11, padding:'6px 14px', cursor:'pointer',
          }}>↓ JSON</button>
        </a>
        <a href={`${API}/api/export/${scanId}/pdf`} target="_blank" rel="noreferrer">
          <button style={{
            background:'linear-gradient(135deg, #1E88E5, #1565C0)',
            border:'none', borderRadius:6,
            color:'#fff', fontSize:11, padding:'6px 14px', cursor:'pointer',
            fontWeight:700,
          }}>↓ PDF Report</button>
        </a>
      </div>

      {/* Centerpiece visuals — attack surface score + severity donut */}
      <div style={{ display:'grid', gridTemplateColumns:'minmax(240px, 1fr) minmax(260px, 1.35fr)',
        gap:14, marginBottom:18 }}>
        <ScoreGauge score={score}/>
        <SeverityDonut counts={sc}/>
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', gap:0, borderBottom:'1px solid #162843', marginBottom:16 }}>
        {[['findings','Findings'], ['charts','Charts'], ['map','Threat Map'], ['modules','Modules']].map(([k,l]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            background:'none', border:'none', borderBottom:`2px solid ${tab===k?'#1E88E5':'transparent'}`,
            color: tab===k ? '#42A5F5' : '#3B6B96', cursor:'pointer',
            fontSize:12, fontWeight: tab===k ? 700 : 400, padding:'8px 16px',

        <button onClick={onCancel} style={{
          background:'none', border:'1px solid #162843', borderRadius:6,
          color:'#5B7FA6', fontSize:11, padding:'6px 14px', cursor:'pointer',
        }}>← Back to results</button>
      </div>
    </div>
  );
}

// ─── Traffic Analyzer ────────────────────────────────────────────────────────────
// Client-side IDOR candidate detection. No backend involved.

const TA_TRACKING_NOISE = [
  'doubleclick.net','google-analytics.com','googletagmanager.com','googlesyndication.com',
  'facebook.net','linkedin.com','pinterest.com','bing.com','adsrvr.org','snapchat.com',
  'reddit.com','optimizely.com','zoom.us','cookielaw.org',
];

const TA_SENSITIVE_KEYWORDS = [
  'user','account','profile','admin','ssn','tax','payment','billing','order','invoice',
  'document','file','download','export','report','email','password','basicinfo','fields',
  'settings','preferences',
];

// Words that, when directly followed by a numeric segment, signal a resource/{id} route
const TA_RESOURCE_WORDS = [
  'user','account','profile','order','invoice','document','file','report','payment',
  'billing','customer','member','card','transaction','return','tax',
];

const TA_UUID_RE = /[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/;
const TA_URL_RE = /https?:\/\/[^\s"'<>)\]}]+/gi;
const TA_RISK_COLORS = { HIGH:'#EF4444', MEDIUM:'#EAB308', LOW:'#22C55E' };

const TA_EXAMPLE = [
  'https://www.taxact.com/api/user/550976791/basicinfo',
  'https://www.taxact.com/api/user/550976791/fields',
  'https://www.taxact.com/api/account/12345/settings',
  'https://www.taxact.com/return/2023/download?document_id=98765',
  'https://www.taxact.com/api/v2/profile/8f14e45f-ceea-467d-9a3e-1b2c3d4e5f60',
  'https://www.taxact.com/billing/invoice/44821/export',
  'https://www.taxact.com/api/user/profile?user_id=550976791&order_id=7781',
  'https://www.taxact.com/tax/report/2023/summary',
  'GET https://www.taxact.com/api/user/550976792/basicinfo HTTP/1.1',
  'https://securepubads.g.doubleclick.net/gampad/ads?correlator=123456',
  'https://www.google-analytics.com/collect?tid=UA-000000&cid=987654',
  'https://px.ads.linkedin.com/collect?pid=99&time=1700000000',
  'https://www.taxact.com/about/contact',
].join('\n');

function taExtractUrls(text) {
  const urls = [];
  (text || '').split(/\r?\n/).forEach(line => {
    const matches = line.match(TA_URL_RE);
    if (matches) matches.forEach(u => urls.push(u.replace(/[.,;]+$/, '')));
  });
  return urls;
}

function taIsNoise(url) {
  let host = '';
  try { host = new URL(url).hostname.toLowerCase(); } catch (e) { return false; }
  return TA_TRACKING_NOISE.some(n => host === n || host.endsWith('.' + n));
}

function taIsIdParam(name) {
  const n = name.toLowerCase();
  if (['id','uid','guid','uuid','userid','accountid','orderid'].includes(n)) return true;
  if (/_id$/i.test(name)) return true;   // user_id, account_id, order_id
  if (/Id$/.test(name)) return true;     // camelCase userId
  return false;
}

function taAnalyzeOne(url) {
  let u;
  try { u = new URL(url); } catch (e) { return null; }
  const path = u.pathname;
  const detections = [];
  let score = 0;

  // Numeric ID in path (4+ digits)
  const numMatch = path.match(/\/(\d{4,})(?=\/|$)/);
  if (numMatch) { detections.push('Numeric ID in path: ' + numMatch[1]); score += 3; }

  // UUID in path
  const uuidMatch = path.match(TA_UUID_RE);
  if (uuidMatch) { detections.push('UUID in path: ' + uuidMatch[0]); score += 3; }

  // ID-like query parameters
  const idParams = [];
  u.searchParams.forEach((v, k) => { if (taIsIdParam(k)) idParams.push(k + '=' + v); });
  if (idParams.length) { detections.push('ID-like query parameter: ' + idParams.join(', ')); score += 3; }

  // Resource path with numeric ID (e.g. /user/123, /account/456)
  const segs = path.split('/').filter(Boolean);
  for (let i = 0; i < segs.length - 1; i++) {
    if (TA_RESOURCE_WORDS.includes(segs[i].toLowerCase()) && /^\d+$/.test(segs[i + 1])) {
      detections.push('Resource path with numeric ID: /' + segs[i] + '/' + segs[i + 1]);
      score += 2;
      break;
    }
  }

  // Sensitive keywords in path
  const lowerPath = path.toLowerCase();
  const keywords = TA_SENSITIVE_KEYWORDS.filter(k => lowerPath.includes(k));
  score += keywords.length;

  if (score === 0) return null;

  const risk = score >= 6 ? 'HIGH' : score >= 3 ? 'MEDIUM' : 'LOW';

  // Dedup pattern: replace UUIDs and numeric IDs with {id}
  const patternPath = path.replace(new RegExp(TA_UUID_RE, 'g'), '{id}').replace(/\d{2,}/g, '{id}');
  const paramKeys = [...u.searchParams.keys()].sort().join('&');
  const pattern = u.hostname + patternPath + (paramKeys ? '?' + paramKeys : '');

  return { url, risk, score, detections, keywords, pattern };
}

function taAnalyzeTraffic(text) {
  const urls = taExtractUrls(text);
  const seenUrl = new Set();
  const byPattern = new Map();

  urls.forEach(url => {
    if (seenUrl.has(url)) return;
    seenUrl.add(url);
    if (taIsNoise(url)) return;
    const r = taAnalyzeOne(url);
    if (!r) return;
    const existing = byPattern.get(r.pattern);
    if (!existing) {
      byPattern.set(r.pattern, Object.assign({}, r, { count: 1 }));
    } else {
      existing.count += 1;
      if (r.score > existing.score) {
        existing.url = r.url; existing.score = r.score; existing.risk = r.risk;
        existing.detections = r.detections; existing.keywords = r.keywords;
      }
    }
  });

  const order = { HIGH: 0, MEDIUM: 1, LOW: 2 };
  const candidates = [...byPattern.values()]
    .sort((a, b) => order[a.risk] - order[b.risk] || b.score - a.score);

  const summary = {
    total: candidates.length,
    high: candidates.filter(c => c.risk === 'HIGH').length,
    medium: candidates.filter(c => c.risk === 'MEDIUM').length,
    low: candidates.filter(c => c.risk === 'LOW').length,
  };
  return { candidates, summary };
}

  const color = TA_RISK_COLORS[c.risk];

  const copy = () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 1200); };

      ta.value = c.url; document.body.appendChild(ta); ta.select();

  return (
    <div className="card fade-in" style={{ padding:'14px 16px', borderLeft:`3px solid ${color}` }}>

        <span style={{

        <button onClick={copy} style={{

}

// ─── Phishing Analyzer ───────────────────────────────────────────────────────────
// Client-side email header authentication + routing analysis. No backend involved.

const PH_VERDICT_COLORS = { GREEN:'#22C55E', YELLOW:'#EAB308', RED:'#EF4444' };
const PH_VERDICT_LABEL  = { GREEN:'LIKELY LEGITIMATE', YELLOW:'SUSPICIOUS', RED:'LIKELY PHISHING' };

const PH_EXAMPLE = [
  'Delivered-To: victim@example.com',
  'Received: from mail.example.com (mail.example.com [10.0.0.5])',
  '        by mx.example.com with ESMTPS id abc123def456',
  '        (version=TLS1_2 cipher=ECDHE-RSA-AES128-GCM-SHA256)',
  '        for <victim@example.com>; Tue, 01 Jul 2026 10:05:42 -0700 (PDT)',
  'Received: from smtp.sketchy-host.ru (smtp.sketchy-host.ru [185.220.101.44])',

  '        Tue, 01 Jul 2026 10:05:05 -0700 (PDT)',
  'Received: from webmail.paypa1-secure.com (unknown [45.137.22.9])',
  '        by smtp.sketchy-host.ru with SMTP id ghi789jkl012;',
  '        Tue, 01 Jul 2026 10:03:58 -0700 (PDT)',
  'Authentication-Results: mx.example.com;',
  '        spf=fail (sender IP is 45.137.22.9) smtp.mailfrom=alerts@paypa1-secure.com;',
  '        dkim=fail reason="body hash did not verify" header.d=paypa1-secure.com;',
  '        dmarc=fail (p=reject) header.from=paypal.com',
  'Received-SPF: fail (mx.example.com: domain of alerts@paypa1-secure.com does not',
  '        designate 45.137.22.9 as permitted sender) client-ip=45.137.22.9;',
  'Return-Path: <bounce@paypa1-secure.com>',
  'From: "PayPal Security" <alerts@paypal.com>',
  'Reply-To: <verify@account-check.net>',
  'To: <victim@example.com>',
