  'Message-ID: <9f83kd0293@paypa1-secure.com>',
  'X-Mailer: PHPMailer 6.1.7 (https://github.com/PHPMailer/PHPMailer)',
  'X-Priority: 1 (Highest)',
  'MIME-Version: 1.0',
  'Content-Type: text/html; charset=UTF-8',
].join('\n');

function phParseHeaders(raw) {
  const lines = (raw || '').split(/\r?\n/);
  const headers = [];
  let cur = null;
  for (const line of lines) {
    if (/^[ \t]/.test(line) && cur) {
      cur.value += ' ' + line.trim();
    } else {
      const m = line.match(/^([^\s:]+):[ \t]?(.*)$/);
      if (m) { cur = { name: m[1], value: m[2] }; headers.push(cur); }
    }
  }
  return headers;
}

const phGetAll = (headers, name) =>
  headers.filter(h => h.name.toLowerCase() === name.toLowerCase()).map(h => h.value);
const phGetFirst = (headers, name) => {
  const v = phGetAll(headers, name);
  return v.length ? v[0] : null;
};

function phParseAddress(v) {
  if (!v) return null;
  const m = v.match(/(?:"?([^"<]*?)"?\s*)?<([^>]+)>/);
  if (m) return { name: (m[1] || '').trim(), email: m[2].trim() };
  const bare = v.trim().replace(/^<|>$/g, '');
  return { name: '', email: bare };
}
const phDomain = (email) => {
  if (!email) return '';
  const i = email.lastIndexOf('@');
  return i >= 0 ? email.slice(i + 1).toLowerCase().replace(/[>;].*$/, '').trim() : '';
};

function phParseReceived(value) {
  const server =
    (value.match(/from\s+([^\s;()]+)/i) || [])[1] ||
    (value.match(/by\s+([^\s;()]+)/i) || [])[1] || 'unknown';
  const ip =
    (value.match(/[\[(]((?:\d{1,3}\.){3}\d{1,3})[\])]/) || [])[1] ||
    (value.match(/[\[(]([0-9a-fA-F:]{3,})[\])]/) || [])[1] || null;
  const semi = value.lastIndexOf(';');
  const tsRaw = semi >= 0 ? value.slice(semi + 1).replace(/\([^)]*\)/g, '').trim() : null;
  let date = null;
  if (tsRaw) { const d = new Date(tsRaw); if (!isNaN(d.getTime())) date = d; }
  const tls = (value.match(/version=(TLS[0-9._]+)/i) || [])[1] ||
    (/\bTLS[0-9._]*\b/i.test(value) ? (value.match(/\bTLS[0-9._]*\b/i) || [])[0] : null);
  const proto = (value.match(/with\s+(ESMTPSA?|ESMTPS|ESMTPA?|ESMTP|SMTPS?|LMTP|HTTPS?)/i) || [])[1] || null;
  return { server, ip, tsRaw, date, tls, proto, raw: value };
}

function phExtractAuth(headers) {
  const authText = [
    ...phGetAll(headers, 'Authentication-Results'),
    ...phGetAll(headers, 'ARC-Authentication-Results'),
    ...phGetAll(headers, 'Received-SPF').map(v => 'spf=' + v),
  ].join(' ; ');

  const pick = (re) => { const m = authText.match(re); return m ? m[1].toLowerCase() : null; };
  const spf = pick(/spf=(pass|fail|softfail|neutral|none|temperror|permerror)/i);
  const dkim = pick(/dkim=(pass|fail|none|neutral|temperror|permerror)/i);
  const dmarc = pick(/dmarc=(pass|fail|none|bestguesspass)/i);

  const ip =
    (authText.match(/client-ip=([0-9a-fA-F:.]+)/i) || [])[1] ||
    (authText.match(/sender IP is\s+([0-9a-fA-F:.]+)/i) || [])[1] || null;
  const mailfrom = (authText.match(/smtp\.mailfrom=([^\s;)]+)/i) || [])[1] || null;
  const policy = (authText.match(/\bp=(none|quarantine|reject)/i) || [])[1] || null;
  const bodyHashFail = dkim === 'fail' && /body\s*hash/i.test(authText);
  const headerFrom = (authText.match(/header\.from=([^\s;)]+)/i) || [])[1] || null;

  return { spf, dkim, dmarc, ip, mailfrom, policy, bodyHashFail, headerFrom };
}

function phAnalyze(raw) {
  const headers = phParseHeaders(raw);
  if (!headers.length) return null;

  const auth = phExtractAuth(headers);

  // Route (chronological = received headers reversed)
  const received = phGetAll(headers, 'Received').map(phParseReceived).reverse();
  const hops = received.map((h, i) => {
    let delaySec = null;
    if (i > 0 && h.date && received[i - 1].date) {
      delaySec = Math.round((h.date - received[i - 1].date) / 1000);
    }
    return { ...h, delaySec, unusualDelay: delaySec != null && delaySec > 30 };
  });

  // Sender analysis
  const from = phParseAddress(phGetFirst(headers, 'From'));
  const returnPath = phParseAddress(phGetFirst(headers, 'Return-Path'));
  const replyTo = phParseAddress(phGetFirst(headers, 'Reply-To'));
  const fromDom = from ? phDomain(from.email) : '';
  const rpDom = returnPath ? phDomain(returnPath.email) : '';
  const replyDom = replyTo ? phDomain(replyTo.email) : '';
  const mailfromDom = auth.mailfrom ? phDomain(auth.mailfrom) : '';

  const domainMismatch = fromDom && rpDom && fromDom !== rpDom;
  const mailfromMismatch = fromDom && mailfromDom && fromDom !== mailfromDom;
  const replyToDiff = replyDom && fromDom && replyDom !== fromDom;

  // Display-name embeds a different domain than the actual sender
  let displayNameMismatch = false;
  if (from && from.name) {
    const dm = from.name.match(/([a-z0-9-]+\.[a-z]{2,})/i);
    if (dm && fromDom && dm[1].toLowerCase() !== fromDom) displayNameMismatch = true;
  }

  // Lookalike / typosquat: digits embedded inside an otherwise-alpha brand domain
  const lookalikeDomains = [...new Set([fromDom, rpDom, mailfromDom, replyDom].filter(Boolean))]
    .filter(d => /[a-z][0-9]|[0-9][a-z]/.test(d.split('.')[0]));
  const lookalike = lookalikeDomains.length > 0;

  // Suspicious X-headers
  const suspiciousX = [];
  const xMailer = phGetFirst(headers, 'X-Mailer');
  if (xMailer && /phpmailer|x-php|sendmail|swiftmailer/i.test(xMailer))
    suspiciousX.push('X-Mailer: ' + xMailer);
  const xPriority = phGetFirst(headers, 'X-Priority');
  if (xPriority && /^\s*1\b/.test(xPriority)) suspiciousX.push('X-Priority: ' + xPriority + ' (forced high priority)');
  if (phGetFirst(headers, 'X-PHP-Originating-Script'))
    suspiciousX.push('X-PHP-Originating-Script present (sent from a PHP script)');

  // ── Red flags ──────────────────────────────────────────────────────────────
  const flags = [];
  const add = (sev, text) => flags.push({ sev, text });

  if (domainMismatch) add('high', `From domain (${fromDom}) does not match Return-Path domain (${rpDom})`);
  if (mailfromMismatch) add('high', `From domain (${fromDom}) does not match envelope sender (${mailfromDom})`);
  if (lookalike) add('high', `Lookalike/typosquat domain detected: ${lookalikeDomains.join(', ')}`);
  if (auth.spf === 'fail') add('high', 'SPF check failed — sending IP is not authorized for the sender domain');
  else if (auth.spf === 'softfail') add('medium', 'SPF softfail — sending IP is not clearly authorized');
  if (auth.dkim === 'fail') add('high', auth.bodyHashFail ? 'DKIM failed — body hash did not verify (message body was altered)' : 'DKIM signature failed');
  if (auth.dmarc === 'fail') add('high', `DMARC failed${auth.policy ? ` (published policy: ${auth.policy})` : ''}`);
  if (!auth.spf) add('medium', 'No SPF result present in Authentication-Results');
  if (!auth.dkim) add('medium', 'No DKIM result present in Authentication-Results');
  if (!auth.dmarc) add('medium', 'No DMARC result present in Authentication-Results');
  if (replyToDiff) add('medium', `Reply-To domain (${replyDom}) differs from From domain (${fromDom})`);
  if (displayNameMismatch) add('medium', `From display name references a domain other than ${fromDom}`);
  suspiciousX.forEach(x => add('low', 'Suspicious header — ' + x));
  if (hops.length > 5) add('low', `Message passed through ${hops.length} hops (unusually high)`);
  hops.filter(h => h.unusualDelay).forEach(h =>
    add('low', `Unusual delay of ${h.delaySec}s before hop via ${h.server}`));

  // ── Verdict ────────────────────────────────────────────────────────────────
  const failCount = ['spf', 'dkim', 'dmarc'].filter(k => auth[k] === 'fail').length;
  const missingCount = ['spf', 'dkim', 'dmarc'].filter(k => !auth[k]).length;
  const allPass = auth.spf === 'pass' && auth.dkim === 'pass' && auth.dmarc === 'pass';
  const hasHardIndicator = domainMismatch || mailfromMismatch || lookalike;

  let verdict;
  if (failCount >= 2 || (failCount >= 1 && hasHardIndicator)) verdict = 'RED';
  else if (allPass && flags.length === 0) verdict = 'GREEN';
  else if (failCount >= 1 || missingCount > 0 || flags.length > 0) verdict = 'YELLOW';
  else verdict = 'GREEN';

  return {
    verdict, auth, hops,
    sender: { from, returnPath, replyTo, fromDom, rpDom, replyDom, mailfromDom,
              domainMismatch, mailfromMismatch, replyToDiff, displayNameMismatch },
    flags, headers, raw,
  };
}

// ── UI helpers ─────────────────────────────────────────────────────────────────
function PhAuthRow({ label, status, detail, note }) {
  const pass = status === 'pass';
  const fail = status === 'fail';
  const color = pass ? '#22C55E' : fail ? '#EF4444' : '#EAB308';
  const icon = pass ? '✓' : fail ? '✗' : '!';
  return (
    <div style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'12px 14px',
      background:'#050C18', borderRadius:6, borderLeft:`3px solid ${color}` }}>
      <span style={{
        width:22, height:22, borderRadius:11, background:color, color:'#fff',
        display:'inline-flex', alignItems:'center', justifyContent:'center',
        fontSize:13, fontWeight:700, flexShrink:0, marginTop:1,
      }}>{icon}</span>
      <div style={{ flex:1 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <span style={{ fontSize:13, fontWeight:700, color:'#E2E8F0', fontFamily:'monospace' }}>{label}</span>
          <span style={{ fontSize:11, fontWeight:700, color, textTransform:'uppercase', letterSpacing:'0.05em' }}>
            {status || 'not present'}
          </span>
        </div>
        {detail && <div style={{ fontSize:11, color:'#5B7FA6', marginTop:3 }}>{detail}</div>}
        {note && <div style={{ fontSize:11, color:'#EF4444', marginTop:3 }}>{note}</div>}
      </div>
    </div>
  );
}

function PhSectionTitle({ children }) {
  return (
    <div style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
      textTransform:'uppercase', marginBottom:12 }}>{children}</div>
  );
}

function PhRawHeaders({ raw }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="card" style={{ padding:0, overflow:'hidden' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        width:'100%', textAlign:'left', background:'none', border:'none', cursor:'pointer',
        padding:'14px 18px', color:'#3B6B96', fontSize:11, fontWeight:700,
        letterSpacing:'0.08em', textTransform:'uppercase', display:'flex', alignItems:'center', gap:8,
      }}>
        <span>{open ? '▼' : '▶'}</span> Raw Headers
      </button>
      {open && (
        <pre style={{
          margin:0, padding:'0 18px 16px', overflowX:'auto', fontSize:11.5, lineHeight:1.6,
          fontFamily:"'Courier New', Courier, monospace", whiteSpace:'pre-wrap', wordBreak:'break-word',
        }}>
          {raw.split(/\r?\n/).map((line, i) => {
            const m = line.match(/^([^\s:][^:]*?):(.*)$/);
            if (m) return (
              <div key={i}>
                <span style={{ color:'#42A5F5' }}>{m[1]}:</span>
                <span style={{ color:'#C9D6E8' }}>{m[2]}</span>
              </div>
            );
            return <div key={i} style={{ color:'#5B7FA6' }}>{line || ' '}</div>;
          })}
        </pre>
      )}
    </div>
  );
}

function PhishingAnalyzerView() {
  const [text, setText] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');

  const analyze = () => {
    const r = phAnalyze(text);
    if (!r) { setError('No valid email headers found — paste the full headers and try again.'); setResult(null); return; }
    setError(''); setResult(r);
  };
  const clear = () => { setText(''); setResult(null); setError(''); };
  const loadExample = () => { setText(PH_EXAMPLE); setResult(null); setError(''); };

  const sevColor = { high:'#EF4444', medium:'#EAB308', low:'#64748B' };

  return (
    <div className="fade-in" style={{ maxWidth:900, margin:'28px auto', padding:'0 20px' }}>
      <div style={{ marginBottom:18 }}>
        <h1 style={{ fontSize:22, fontWeight:700, color:'#E2E8F0', margin:'0 0 6px' }}>Phishing Analyzer</h1>
        <p style={{ fontSize:13, color:'#3B6B96', margin:0 }}>
          Paste raw email headers to verify SPF/DKIM/DMARC, trace the delivery route, and surface phishing indicators — runs entirely in your browser.
        </p>
      </div>

      {/* Input */}
      <div className="card" style={{ padding:20 }}>
        <label style={{ fontSize:11, fontWeight:700, color:'#3B6B96', letterSpacing:'0.08em',
          textTransform:'uppercase', display:'block', marginBottom:8 }}>Email Headers</label>
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          rows={20}
          placeholder="Paste full email headers here..."
          style={{
            width:'100%', resize:'vertical',
            background:'#050C18', border:'1.5px solid #1E3A5A', borderRadius:8,
            color:'#E2E8F0', fontSize:12.5, lineHeight:1.6, padding:'12px 14px',
            fontFamily:"'Courier New', Courier, monospace",
          }}
        />
        <div style={{ display:'flex', gap:8, marginTop:14, flexWrap:'wrap' }}>
          <button onClick={analyze} style={{
            background:'linear-gradient(135deg, #1E88E5, #1565C0)', border:'none', borderRadius:8,
            color:'#fff', fontSize:14, fontWeight:700, padding:'11px 22px', cursor:'pointer',
            letterSpacing:'0.03em', boxShadow:'0 4px 15px #1E88E530',
          }}>→ Analyze Headers</button>
          <button onClick={loadExample} style={{
            background:'transparent', border:'1px solid #1E3A5A', borderRadius:8,
            color:'#5B7FA6', fontSize:12, padding:'11px 16px', cursor:'pointer',
          }}>Load Example</button>
          <button onClick={clear} style={{
            background:'transparent', border:'1px solid #1E3A5A', borderRadius:8,
            color:'#5B7FA6', fontSize:12, padding:'11px 16px', cursor:'pointer',
          }}>Clear</button>
        </div>
        {error && (
          <div style={{ marginTop:12, fontSize:12, color:'#EF4444', padding:'8px 12px',
            background:'#EF444415', borderRadius:6, border:'1px solid #EF444430' }}>{error}</div>
        )}
      </div>

      {result && (
        <div style={{ marginTop:20, display:'flex', flexDirection:'column', gap:16 }}>
          {/* Verdict banner */}
          <div style={{
            padding:'20px 24px', borderRadius:10,
            background: `${PH_VERDICT_COLORS[result.verdict]}18`,
            border: `1.5px solid ${PH_VERDICT_COLORS[result.verdict]}`,
            display:'flex', alignItems:'center', gap:16,
          }}>
            <span style={{
              width:44, height:44, borderRadius:22, flexShrink:0,
              background: PH_VERDICT_COLORS[result.verdict], color:'#fff',
              display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:24, fontWeight:900,
            }}>{result.verdict === 'GREEN' ? '✓' : result.verdict === 'YELLOW' ? '!' : '✗'}</span>
            <div>
              <div style={{ fontSize:22, fontWeight:800, color:PH_VERDICT_COLORS[result.verdict], letterSpacing:'0.02em' }}>
                {PH_VERDICT_LABEL[result.verdict]}
              </div>
              <div style={{ fontSize:12, color:'#5B7FA6', marginTop:2 }}>
                {result.flags.length} indicator{result.flags.length !== 1 ? 's' : ''} • SPF {result.auth.spf || 'n/a'} · DKIM {result.auth.dkim || 'n/a'} · DMARC {result.auth.dmarc || 'n/a'}
              </div>
            </div>
          </div>

          {/* Authentication results — top priority */}
          <div className="card" style={{ padding:'16px 18px' }}>
            <PhSectionTitle>Authentication Results</PhSectionTitle>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <PhAuthRow label="SPF" status={result.auth.spf}
                detail={result.auth.ip
                  ? `Sending IP ${result.auth.ip}${result.auth.spf === 'pass' ? ' is authorized' : result.auth.spf === 'fail' ? ' is NOT authorized for the sender domain' : ''}`
                  : (result.auth.mailfrom ? `Envelope sender ${result.auth.mailfrom}` : null)}
              />
              <PhAuthRow label="DKIM" status={result.auth.dkim}
                detail={result.auth.dkim === 'pass' ? 'Signature verified' : result.auth.dkim === 'fail' ? 'Signature did not verify' : null}
                note={result.auth.bodyHashFail ? 'Body hash did not verify — the message body was altered in transit' : null}
              />
              <PhAuthRow label="DMARC" status={result.auth.dmarc}
                detail={result.auth.policy ? `Published policy: p=${result.auth.policy}` : 'No published policy detected'}
              />
            </div>
          </div>

          {/* Email route */}
          <div className="card" style={{ padding:'16px 18px' }}>
            <PhSectionTitle>Email Route — {result.hops.length} hop{result.hops.length !== 1 ? 's' : ''} (chronological)</PhSectionTitle>
            {result.hops.length === 0 ? (
              <div style={{ fontSize:12, color:'#5B7FA6' }}>No Received headers found.</div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                {result.hops.map((h, i) => (
                  <div key={i}>
                    {h.delaySec != null && (
                      <div style={{ fontSize:10, textAlign:'center', margin:'2px 0',
                        color: h.unusualDelay ? '#EF4444' : '#2A4D73' }}>
                        ↓ {h.delaySec}s {h.unusualDelay ? '⚠ unusual delay' : ''}
                      </div>
                    )}
                    <div style={{ display:'flex', gap:10, padding:'10px 12px', background:'#050C18',
                      borderRadius:6, borderLeft:`3px solid ${h.unusualDelay ? '#EF4444' : '#1E3A5A'}` }}>
                      <span style={{ fontSize:11, color:'#3B6B96', fontVariantNumeric:'tabular-nums', flexShrink:0, marginTop:1 }}>
                        {i + 1}
                      </span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:12, fontWeight:700, color:'#C9D6E8', fontFamily:'monospace',
                          overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{h.server}</div>
                        <div style={{ fontSize:10.5, color:'#5B7FA6', marginTop:2, display:'flex', gap:10, flexWrap:'wrap' }}>
                          {h.ip && <span style={{ fontFamily:'monospace' }}>{h.ip}</span>}
                          {h.proto && <span>{h.proto}</span>}
                          <span style={{ color: h.tls ? '#22C55E' : '#EAB308' }}>{h.tls ? h.tls.replace('_','.') : 'no TLS'}</span>
                          {h.tsRaw && <span>{h.tsRaw}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Sender analysis */}
          <div className="card" style={{ padding:'16px 18px' }}>
            <PhSectionTitle>Sender Analysis</PhSectionTitle>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {[
                { label:'From', addr:result.sender.from, flag:result.sender.displayNameMismatch,
                  flagText:'display name references another domain' },
                { label:'Return-Path (envelope)', addr:result.sender.returnPath, flag:result.sender.domainMismatch,
                  flagText:'domain differs from From' },
                { label:'Envelope sender (smtp.mailfrom)', addr: result.auth.mailfrom ? { name:'', email:result.auth.mailfrom } : null,
                  flag:result.sender.mailfromMismatch, flagText:'domain differs from From' },
                { label:'Reply-To', addr:result.sender.replyTo, flag:result.sender.replyToDiff,
                  flagText:'differs from From — replies go elsewhere' },
              ].filter(r => r.addr).map((r, i) => (
                <div key={i} style={{ display:'flex', gap:10, padding:'10px 12px', background:'#050C18', borderRadius:6,
                  borderLeft:`3px solid ${r.flag ? '#EF4444' : '#1E3A5A'}` }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:10, color:'#3B6B96', fontWeight:700, letterSpacing:'0.05em', textTransform:'uppercase' }}>
                      {r.label}
                    </div>
                    <div style={{ fontSize:12, color:'#C9D6E8', fontFamily:'monospace', marginTop:2, wordBreak:'break-all' }}>
                      {r.addr.name ? <span style={{ color:'#E2E8F0' }}>{r.addr.name} </span> : null}
                      <span style={{ color:'#5B7FA6' }}>&lt;{r.addr.email}&gt;</span>
                    </div>
                  </div>
                  {r.flag && (
                    <span style={{ fontSize:10, color:'#EF4444', flexShrink:0, marginTop:2 }}>⚠ {r.flagText}</span>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Red flags */}
          <div className="card" style={{ padding:'16px 18px' }}>
            <PhSectionTitle>Red Flags {result.flags.length > 0 ? `(${result.flags.length})` : ''}</PhSectionTitle>
            {result.flags.length === 0 ? (
              <div style={{ fontSize:12, color:'#22C55E' }}>✓ No phishing indicators detected.</div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                {result.flags.map((f, i) => (
                  <div key={i} style={{ display:'flex', gap:10, alignItems:'flex-start', fontSize:12, color:'#C9D6E8' }}>
                    <span style={{ width:8, height:8, borderRadius:4, background:sevColor[f.sev],
                      flexShrink:0, marginTop:5 }}/>
                    <span style={{ flex:1 }}>{f.text}</span>
                    <span style={{ fontSize:9, fontWeight:700, color:sevColor[f.sev], textTransform:'uppercase',
                      letterSpacing:'0.05em', flexShrink:0, marginTop:2 }}>{f.sev}</span>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Raw headers */}
          <PhRawHeaders raw={result.raw}/>
        </div>
      )}
    </div>
  );
}

// ─── Root App ───────────────────────────────────────────────────────────────────
function App() {
  const [theme, setTheme] = useState('dark');
  const [view, setView] = useState('home');
  const [scanId, setScanId] = useState(null);
  const [scanTarget, setScanTarget] = useState('');
  const [scanActive, setScanActive] = useState(false);
  const [history, setHistory] = useState([]);
  const [compareMode, setCompareMode] = useState(false);
  const [selectedForCompare, setSelectedForCompare] = useState([]);

  // Apply theme to body
  useEffect(() => {
    document.body.className = theme === 'light' ? 'light' : '';
  }, [theme]);

  // Load history on mount and refresh after scans
  const refreshHistory = useCallback(() => {
    api.getHistory().then(setHistory).catch(() => {});
  }, []);

  useEffect(() => { refreshHistory(); }, []);

  const handleNav = (dest) => {
    if (dest === 'home') {
      setView('home'); setScanId(null); setCompareMode(false); setSelectedForCompare([]);
    } else {
      setView(dest);
    }
  };

  const handleScanStart = (id, target, active) => {
    setScanId(id);
    setScanTarget(target);
    setScanActive(active);
    setView('scanning');
    setSelectedForCompare([]);
    setCompareMode(false);
  };

  const handleScanComplete = (id) => {
    refreshHistory();
    setScanId(id);
    setView('results');
  };

  const handleHistorySelect = (id) => {
    if (compareMode) {
      setSelectedForCompare(prev => {
        if (prev.includes(id)) return prev.filter(x => x !== id);
        if (prev.length >= 2) return [prev[1], id];
        return [...prev, id];
      });
      return;
    }
    const h = history.find(x => x.scan_id === id);
    if (h) setScanTarget(h.target);
    setScanId(id);
    setView(h?.status === 'running' ? 'scanning' : 'results');
  };

  const handleCompare = () => {
    if (selectedForCompare.length === 2) setView('compare');
  };

  const toggleCompareMode = () => {
    setCompareMode(p => !p);
    setSelectedForCompare([]);
  };

  const activeScanId = view === 'compare' ? null : scanId;

  const ctxValue = { theme, toggle: () => setTheme(t => t === 'dark' ? 'light' : 'dark') };

  return (
    <ThemeCtx.Provider value={ctxValue}>
      <div style={{
        display:'flex', flexDirection:'row', height:'100vh', overflow:'hidden',
        background: theme==='dark' ? '#050C18' : '#F0F4F8',
      }}>
        <Sidebar
          view={view}
          onNav={handleNav}
          history={history}
          onSelect={handleHistorySelect}
          activeScanId={activeScanId}
          compareMode={compareMode}
          selectedForCompare={selectedForCompare}
          onToggleCompare={toggleCompareMode}
        />

        <div style={{ display:'flex', flexDirection:'column', flex:1, overflow:'hidden' }}>
          <Header
            view={view}
            onBack={() => { setView('home'); setScanId(null); setCompareMode(false); setSelectedForCompare([]); }}
            onNav={handleNav}
            scanTarget={scanTarget}
          />

          <main style={{ flex:1, overflowY:'auto', overflowX:'hidden' }}>
            {/* Compare launch bar */}
            {compareMode && selectedForCompare.length === 2 && view !== 'compare' && (
              <div style={{
                background:'#0A1628', borderBottom:'1px solid #162843',
                padding:'8px 20px', display:'flex', alignItems:'center', gap:10,
              }}>
                <span style={{ fontSize:11, color:'#C9D6E8' }}>
                  Comparing: <span style={{ fontFamily:'monospace', color:'#A78BFA' }}>
                    {selectedForCompare.join(' vs ')}
                  </span>
                </span>
                <button onClick={handleCompare} style={{
                  background:'#A78BFA', border:'none', borderRadius:5,
                  color:'#fff', fontSize:11, fontWeight:700, padding:'4px 12px', cursor:'pointer',
                }}>View Diff →</button>
              </div>
            )}

            {view === 'home' && <HomeView onScanStart={handleScanStart} history={history}/>}
            {view === 'traffic' && <TrafficAnalyzerView/>}
            {view === 'phishing' && <PhishingAnalyzerView/>}
            {view === 'scanning' && scanId && (
              <ScanningView
                scanId={scanId}
                target={scanTarget}
                active={scanActive}
                onComplete={handleScanComplete}
              />
            )}
            {view === 'results' && scanId && <ResultsView scanId={scanId} history={history}/>}
            {view === 'compare' && (
              <CompareView
                ids={selectedForCompare}
                onCancel={() => { setView('results'); setCompareMode(false); setSelectedForCompare([]); }}
              />
            )}
          </main>
        </div>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
